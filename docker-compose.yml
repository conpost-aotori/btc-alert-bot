# Phase 3: WebSocket realtime mode for AWS Lightsail (or any always-on
# host). State persists under ./data via a bind mount so a
# `docker compose down/up` cycle preserves cooldown + history.

services:
  bot:
    build: .
    image: btc-alert-bot:latest
    container_name: btc-alert-bot
    restart: unless-stopped
    # Resolve via public DNS directly, bypassing the host's
    # systemd-resolved / AWS VPC resolver. On 2026-06-03 the host VPC
    # resolver flaked for ~30h ("Temporary failure in name resolution"),
    # blinding the container the whole time — restarting couldn't help
    # because the new container inherited the same broken host DNS. Pinning
    # Cloudflare + Google here makes the container immune to host DNS faults.
    dns:
      - 1.1.1.1
      - 8.8.8.8
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    # Constrain resources to fit a small Lightsail plan (512MB-1GB RAM).
    mem_limit: 512m
    cpus: 0.5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      # Simple liveness check: process must be alive AND state.json updated
      # within the last 30min (otherwise the WS likely died).
      test: ["CMD-SHELL", "test -f /app/data/state.json && [ $(($(date +%s) - $(stat -c %Y /app/data/state.json))) -lt 1800 ]"]
      interval: 5m
      timeout: 10s
      retries: 3
      start_period: 5m
